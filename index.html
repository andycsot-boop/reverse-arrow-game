<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Reverse Arrow - 反向箭头</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(180deg, #5c94fc 0%, #5c94fc 70%, #00a800 70%, #00a800 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        #gameContainer {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }
        
        #topBar {
            display: flex;
            justify-content: space-between;
            padding: 10px 8px;
            background: rgba(0,0,0,0.3);
            border-bottom: 4px solid #000;
        }
        
        .infoBox {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 9px;
        }
        
        .infoBox .label { font-size: 7px; margin-bottom: 3px; opacity: 0.8; }
        .infoBox .value { font-size: 12px; color: #ffd700; }
        
        #langToggle {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 8px 12px;
            color: #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        #soundToggle {
            position: absolute;
            top: 15px;
            right: 65px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
        }
        
        #pauseBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
        }
        
        #gameArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        #arrowDisplay {
            width: 160px;
            height: 160px;
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            border: 6px solid #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 0 #c44444, 0 15px 20px rgba(0,0,0,0.3);
            position: relative;
            transition: transform 0.1s;
        }
        
        #arrowDisplay.correct {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            box-shadow: 0 10px 0 #16a34a, 0 15px 20px rgba(0,0,0,0.3);
            animation: correctPulse 0.3s ease;
        }
        
        #arrowDisplay.wrong {
            background: linear-gradient(145deg, #6b7280, #4b5563);
            box-shadow: 0 10px 0 #374151, 0 15px 20px rgba(0,0,0,0.3);
            animation: shake 0.4s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .arrow {
            font-size: 80px;
            color: #fff;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        #hint {
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 11px;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.8;
        }
        
        #hint .highlight { color: #ffd700; }
        
        #progressBar {
            width: 100%;
            max-width: 280px;
            height: 16px;
            background: rgba(0,0,0,0.3);
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        #progressFill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            width: 100%;
            transition: width 0.1s linear;
        }
        
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 260px;
        }
        
        .controlBtn {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #ff6b35, #e55a2b);
            border: 4px solid #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 0 #c44444, 0 10px 12px rgba(0,0,0,0.3);
            transition: all 0.1s;
            user-select: none;
        }
        
        .controlBtn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #c44444, 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .controlBtn.correct {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            box-shadow: 0 6px 0 #16a34a, 0 10px 12px rgba(0,0,0,0.3);
        }
        
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        
        .screen.hidden { display: none; }
        
        .screen h1 {
            color: #ffd700;
            font-size: 24px;
            text-shadow: 4px 4px 0 #ff6b35, -2px -2px 0 #fff;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.5;
        }
        
        .screen h2 {
            color: #fff;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.8;
        }
        
        .btn {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border: 4px solid #fff;
            border-radius: 12px;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 0 #16a34a, 0 10px 15px rgba(0,0,0,0.3);
            transition: all 0.1s;
            margin: 5px;
        }
        
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #16a34a, 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .btn.secondary {
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
            box-shadow: 0 6px 0 #2563eb, 0 10px 15px rgba(0,0,0,0.3);
        }
        
        .btn.share {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
            box-shadow: 0 6px 0 #6d28d9, 0 10px 15px rgba(0,0,0,0.3);
        }
        
        .scoreDisplay {
            color: #fff;
            font-size: 18px;
            margin: 15px 0;
            text-shadow: 3px 3px 0 #000;
            text-align: center;
        }
        
        .scoreDisplay .number {
            color: #ffd700;
            font-size: 28px;
        }
        
        .difficultySelect {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .difficultyBtn {
            padding: 12px 16px;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            border: 3px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .difficultyBtn.easy { background: #4ade80; color: #fff; }
        .difficultyBtn.medium { background: #fbbf24; color: #000; }
        .difficultyBtn.hard { background: #ef4444; color: #fff; }
        .difficultyBtn.selected { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        #lives { display: flex; gap: 3px; justify-content: center; margin-top: 3px; }
        .heart { font-size: 12px; }
        
        #combo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #ffd700;
            text-shadow: 3px 3px 0 #ff6b35, -2px -2px 0 #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        #combo.show { animation: comboAnim 0.8s ease forwards; }
        
        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        @media (max-height: 700px) {
            #arrowDisplay { width: 130px; height: 130px; }
            .arrow { font-size: 60px; }
            .controlBtn { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div id="gameContainer">
        <button id="langToggle" onclick="toggleLanguage()">EN/中</button>
        <button id="soundToggle" onclick="toggleSound()">🔊</button>
        <button id="pauseBtn" onclick="pauseGame()">⏸️</button>
        
        <div id="startScreen" class="screen">
            <h1 id="startTitle">⬅️ REVERSE<br>ARROW ➡️</h1>
            <h2 id="startSubtitle">看到箭头按反方向！<br>考验你的反应速度</h2>
            
            <div class="difficultySelect">
                <button class="difficultyBtn easy selected" data-diff="easy" id="btnEasy">简单</button>
                <button class="difficultyBtn medium" data-diff="medium" id="btnMedium">中等</button>
                <button class="difficultyBtn hard" data-diff="hard" id="btnHard">困难</button>
            </div>
            
            <button class="btn" onclick="startGame()" id="btnStart">开始游戏</button>
        </div>
        
        <div id="gameOverScreen" class="screen hidden">
            <h1 id="gameOverTitle">GAME OVER</h1>
            <div class="scoreDisplay">
                <span id="finalScoreLabel">最终得分</span><br>
                <span class="number" id="finalScore">0</span>
            </div>
            <div class="scoreDisplay" style="font-size: 12px;">
                <span id="maxComboLabel">最高连击</span>: <span class="number" id="maxCombo">0</span>
            </div>
            <button class="btn" onclick="restartGame()" id="btnRestart">再玩一次</button>
            <button class="btn share" onclick="shareScore()" id="btnShare">分享成绩</button>
            <button class="btn secondary" onclick="showStartScreen()" id="btnHome">返回主页</button>
        </div>
        
        <div id="pauseScreen" class="screen hidden">
            <h1 id="pauseTitle">PAUSED</h1>
            <button class="btn" onclick="resumeGame()" id="btnResume">继续游戏</button>
            <button class="btn secondary" onclick="showStartScreen()" id="btnQuit">退出游戏</button>
        </div>
        
        <div id="topBar">
            <div class="infoBox">
                <div class="label" id="labelScore">SCORE</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="infoBox">
                <div class="label" id="labelCombo">COMBO</div>
                <div class="value" id="comboDisplay">0</div>
            </div>
            <div class="infoBox">
                <div class="label" id="labelLevel">LEVEL</div>
                <div class="value" id="level">1</div>
            </div>
            <div class="infoBox">
                <div class="label" id="labelLives">LIVES</div>
                <div id="lives"><span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span></div>
            </div>
        </div>
        
        <div id="gameArea">
            <div id="hint"><span id="hintText">按</span> <span class="highlight" id="hintHighlight">相反方向</span><span id="hintExclaim">！</span></div>
            
            <div id="arrowDisplay">
                <div class="arrow" id="currentArrow">⬆️</div>
            </div>
            
            <div id="combo"></div>
            
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>
            
            <div id="controls">
                <div></div>
                <div class="controlBtn" data-dir="up" onclick="handleInput('up')">⬆️</div>
                <div></div>
                <div class="controlBtn" data-dir="left" onclick="handleInput('left')">⬅️</div>
                <div class="controlBtn" data-dir="down" onclick="handleInput('down')">⬇️</div>
                <div class="controlBtn" data-dir="right" onclick="handleInput('right')">➡️</div>
            </div>
        </div>
    </div>
    
    <script>
        const i18n = {
            zh: {
                startTitle: "⬅️ REVERSE<br>ARROW ➡️",
                startSubtitle: "看到箭头按反方向！<br>考验你的反应速度",
                btnEasy: "简单", btnMedium: "中等", btnHard: "困难",
                btnStart: "开始游戏", gameOverTitle: "GAME OVER",
                finalScoreLabel: "最终得分", maxComboLabel: "最高连击",
                btnRestart: "再玩一次", btnShare: "分享成绩", btnHome: "返回主页",
                pauseTitle: "PAUSED", btnResume: "继续游戏", btnQuit: "退出游戏",
                labelScore: "SCORE", labelCombo: "COMBO", labelLevel: "LEVEL", labelLives: "LIVES",
                hintText: "按", hintHighlight: "相反方向", hintExclaim: "！",
                shareText: "我在反向箭头游戏中得了 {score} 分！你能超过我吗？"
            },
            en: {
                startTitle: "⬅️ REVERSE<br>ARROW ➡️",
                startSubtitle: "Press the OPPOSITE direction!<br>Test your reflexes",
                btnEasy: "EASY", btnMedium: "MEDIUM", btnHard: "HARD",
                btnStart: "START GAME", gameOverTitle: "GAME OVER",
                finalScoreLabel: "FINAL SCORE", maxComboLabel: "MAX COMBO",
                btnRestart: "PLAY AGAIN", btnShare: "SHARE", btnHome: "HOME",
                pauseTitle: "PAUSED", btnResume: "RESUME", btnQuit: "QUIT",
                labelScore: "SCORE", labelCombo: "COMBO", labelLevel: "LEVEL", labelLives: "LIVES",
                hintText: "Press the", hintHighlight: "OPPOSITE", hintExclaim: "!",
                shareText: "I scored {score} in Reverse Arrow! Can you beat me?"
            }
        };
        
        let currentLang = 'zh';
        
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            const texts = i18n[currentLang];
            for (const [key, value] of Object.entries(texts)) {
                const el = document.getElementById(key);
                if (el) el.innerHTML = value;
            }
        }
        
        let gameState = {
            isPlaying: false, isPaused: false, score: 0, combo: 0, maxCombo: 0,
            level: 1, lives: 3, currentArrow: null, timeLeft: 100,
            timerInterval: null, difficulty: 'easy', soundEnabled: true
        };
        
        const difficulties = { easy: { time: 3000 }, medium: { time: 2000 }, hard: { time: 1500 } };
        const arrows = ['up', 'down', 'left', 'right'];
        const arrowSymbols = { up: '⬆️', down: '⬇️', left: '⬅️', right: '➡️' };
        const opposite = { up: 'down', down: 'up', left: 'right', right: 'left' };
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!gameState.soundEnabled) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            const sounds = { correct: { freq: 600, duration: 0.1 }, wrong: { freq: 150, duration: 0.3 }, combo: { freq: 800, duration: 0.15 }, levelUp: { freq: 1000, duration: 0.5 } };
            const s = sounds[type];
            osc.frequency.value = s.freq;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + s.duration);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + s.duration);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            setupDifficultyButtons();
            setupKeyboardControls();
        });
        
        function createStars() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 50 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        
        function setupDifficultyButtons() {
            document.querySelectorAll('.difficultyBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.difficultyBtn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    gameState.difficulty = btn.dataset.diff;
                });
            });
        }
        
        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (!gameState.isPlaying || gameState.isPaused) return;
                const keys = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right', w: 'up', s: 'down', a: 'left', d: 'right' };
                if (keys[e.key]) { e.preventDefault(); handleInput(keys[e.key]); }
                else if (e.key === ' ') { e.preventDefault(); pauseGame(); }
            });
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameState = { isPlaying: true, isPaused: false, score: 0, combo: 0, maxCombo: 0, level: 1, lives: 3, currentArrow: null, timeLeft: 100, timerInterval: null, difficulty: gameState.difficulty, soundEnabled: gameState.soundEnabled };
            updateUI();
            nextRound();
        }
        
        function nextRound() {
            if (!gameState.isPlaying || gameState.isPaused) return;
            gameState.currentArrow = arrows[Math.floor(Math.random() * arrows.length)];
            const arrowDisplay = document.getElementById('arrowDisplay');
            arrowDisplay.classList.remove('correct', 'wrong');
            document.getElementById('currentArrow').textContent = arrowSymbols[gameState.currentArrow];
            gameState.timeLeft = 100;
            updateProgressBar();
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            const timeLimit = difficulties[gameState.difficulty].time;
            const decrement = (100 * 50) / timeLimit;
            gameState.timerInterval = setInterval(() => {
                if (gameState.isPaused) return;
                gameState.timeLeft -= decrement;
                updateProgressBar();
                if (gameState.timeLeft <= 0) { clearInterval(gameState.timerInterval); handleTimeout(); }
            }, 50);
        }
        
        function handleInput(direction) {
            if (!gameState.isPlaying || gameState.isPaused || !gameState.currentArrow) return;
            clearInterval(gameState.timerInterval);
            const btn = document.querySelector(`.controlBtn[data-dir="${direction}"]`);
            if (direction === opposite[gameState.currentArrow]) handleCorrect(btn);
            else handleWrong(btn);
        }
        
        function handleCorrect(btn) {
            gameState.combo++;
            if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
            const baseScore = 10, comboBonus = Math.min(gameState.combo * 2, 50), timeBonus = Math.floor(gameState.timeLeft / 10);
            gameState.score += baseScore + comboBonus + timeBonus;
            if (gameState.score > gameState.level * 200) {
                gameState.level++;
                playSound('levelUp');
                showCombo(currentLang === 'zh' ? '升级!' : 'LEVEL UP!');
            } else {
                playSound('correct');
                if (gameState.combo >= 5) { playSound('combo'); showCombo(gameState.combo + ' COMBO!'); }
            }
            document.getElementById('arrowDisplay').classList.add('correct');
            btn.classList.add('correct');
            createParticles(btn);
            setTimeout(() => { btn.classList.remove('correct'); if (gameState.isPlaying) nextRound(); }, 300);
            updateUI();
        }
        
        function handleWrong(btn) {
            gameState.combo = 0;
            gameState.lives--;
            playSound('wrong');
            document.getElementById('arrowDisplay').classList.add('wrong');
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 400);
            updateUI();
            if (gameState.lives <= 0) setTimeout(() => gameOver(), 500);
            else setTimeout(() => { if (gameState.isPlaying) nextRound(); }, 500);
        }
        
        function handleTimeout() {
            gameState.combo = 0;
            gameState.lives--;
            playSound('wrong');
            document.getElementById('arrowDisplay').classList.add('wrong');
            updateUI();
            if (gameState.lives <= 0) setTimeout(() => gameOver(), 500);
            else setTimeout(() => { if (gameState.isPlaying) nextRound(); }, 500);
        }
        
        function showCombo(text) {
            const comboEl = document.getElementById('combo');
            comboEl.textContent = text;
            comboEl.classList.remove('show');
            void comboEl.offsetWidth;
            comboEl.classList.add('show');
        }
        
        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const colors = ['#ffd700', '#ff6b35', '#4ade80', '#fff'];
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = rect.left + rect.width / 2 + 'px';
                particle.style.top = rect.top + rect.height / 2 + 'px';
                document.body.appendChild(particle);
                const angle = (i / 8) * Math.PI * 2;
                const velocity = 80 + Math.random() * 40;
                particle.animate([{ transform: 'translate(0, 0) scale(1)', opacity: 1 }, { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`, opacity: 0 }], { duration: 500, easing: 'ease-out' }).onfinish = () => particle.remove();
            }
        }
        
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('comboDisplay').textContent = gameState.combo;
            document.getElementById('level').textContent = gameState.level;
            const livesEl = document.getElementById('lives');
            livesEl.innerHTML = '';
            for (let i = 0; i < gameState.lives; i++) livesEl.innerHTML += '<span class="heart">❤️</span>';
            for (let i = gameState.lives; i < 3; i++) livesEl.innerHTML += '<span class="heart" style="opacity:0.3;">🖤</span>';
        }
        
        function updateProgressBar() { document.getElementById('progressFill').style.width = Math.max(0, gameState.timeLeft) + '%'; }
        
        function pauseGame() { if (!gameState.isPlaying) return; gameState.isPaused = true; document.getElementById('pauseScreen').classList.remove('hidden'); }
        function resumeGame() { gameState.isPaused = false; document.getElementById('pauseScreen').classList.add('hidden'); }
        
        function gameOver() {
            gameState.isPlaying = false;
            clearInterval(gameState.timerInterval);
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('maxCombo').textContent = gameState.maxCombo;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function restartGame() { startGame(); }
        
        function showStartScreen() {
            gameState.isPlaying = false;
            gameState.isPaused = false;
            clearInterval(gameState.timerInterval);
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('pauseScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }
        
        function toggleSound() {
            gameState.soundEnabled = !gameState.soundEnabled;
            document.getElementById('soundToggle').textContent = gameState.soundEnabled ? '🔊' : '🔇';
        }
        
        function shareScore() {
            const text = i18n[currentLang].shareText.replace('{score}', gameState.score);
            if (navigator.share) navigator.share({ title: 'Reverse Arrow Game', text: text, url: window.location.href });
            else alert(text + '\n\n' + window.location.href);
        }
        
        document.addEventListener('touchmove', (e) => { if (gameState.isPlaying) e.preventDefault(); }, { passive: false });
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => { const now = Date.now(); if (now - lastTouchEnd <= 300) e.preventDefault(); lastTouchEnd = now; }, false);
    </script>
</body>
</html>
